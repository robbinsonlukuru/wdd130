<head>
  <meta charset="UTF-8">

  <title>Contact Us | Wild Water Rafting</title>
  <link rel="stylesheet" href="styles/rafting.css"/>
</head>
<body>

  <header>
    <img src="https://byui-cse.github.io/wdd130-ww-course/resources/images/logos/z-therapidssplash.jpg" alt="Wild Water Rafting Logo">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main class="contact-main">

    <h1>Contact Us</h1>
    <section class="contact-info">
      <div class="company-details">
        <h2>Get in Touch</h2>
        <p><strong>Address:</strong><br>
          Nairobi, Kenya.<br>
          00100 Nairobi.</p>
        <p><strong>Phone:</strong><br>
          <a href="tel:+12085550192">+254 740396779</a><br>
          <a href="tel:+12085550173">+254 736768494</a></p>
        <p><strong>Email:</strong><br>
          <a href="robbinsonlukuru@gmail.com">robbinsonlukuru@gmail.com</a></p>
      </div>

      <div class="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d255281.19907757788!2d36.6821372!3d-1.3031934!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f1172d84d49a7%3A0xf7cf0254b297924c!2sNairobi%2C%20Kenya!5e0!3m2!1sen!2ske!4v1700000000000!5m2!1sen!2ske"
          width="400"
          height="250"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Wild Water Rafting location map">
        </iframe>
      </div>
    </section>
    <section class="employees">
      <h2>Meet Our Team</h2>
      <div class="employee-cards">
        <figure>
          <img src="https://byui-cse.github.io/wdd130-ww-course/resources/images/rafting59_600.jpg" alt="Portrait of Marco Rivera, Head River Guide">
          <figcaption>
            <strong>Marco Rivera</strong><br>
            Head River Guide
          </figcaption>
        </figure>
        <figure>
          <img src="https://images.pexels.com/photos/1497585/pexels-photo-1497585.jpeg" alt="Portrait of Aisha Mwangi, Safety Director">
          <figcaption>
            <strong>Aisha Mwangi</strong><br>
            Safety Director
          </figcaption>
        </figure>
        <figure>
          <img src="https://images.pexels.com/photos/2404843/pexels-photo-2404843.jpeg" alt="Portrait of James Okello, Customer Experience Manager">
          <figcaption>
            <strong>James Okello</strong><br>
            Customer Experience Manager
          </figcaption>
        </figure>
      </div>
    </section>
    <section class="contact-form-section">
      <h2>Send Us a Message</h2>
      <form class="contact-form" action="#" method="post">

        <div class="form-group">
          <label for="fullname">Your Name</label>
          <input type="text" id="fullname" name="fullname" placeholder="Jane Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required>
        </div>

        <fieldset class="form-group">
          <legend>Purpose of Message</legend>
          <label class="radio-label">
            <input type="radio" name="purpose" value="general" required>
            General Inquiry
          </label>
          <label class="radio-label">
            <input type="radio" name="purpose" value="reservation">
            Reservation Question
          </label>
          <label class="radio-label">
            <input type="radio" name="purpose" value="website">
            Website Suggestion
          </label>
        </fieldset>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message here…" required></textarea>
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" name="newsletter" id="newsletter">
            Please subscribe me to the monthly newsletter
          </label>
        </div>

        <button type="submit" class="submit-btn">Send My Message</button>

      </form>
    </section>

  </main>

  <footer>
    <p>&copy; 2025 Wild Water Rafting | Robbinson Lukuru</p>

      <a href="https://linkedin.com">
        <img src="https://byui-cse.github.io/wdd130-ww-course/resources/images/icons/linkedin.svg" alt="LinkedIn" width="50">
      </a>
      <a href="https://instagram.com">
        <img src="https://byui-cse.github.io/wdd130-ww-course/resources/images/icons/instagram.svg" alt="Instagram Icon" width="50">
      </a>
    </nav>
  </footer>

</body>
</html>
